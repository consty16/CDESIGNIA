<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — SC Security Consulting</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'Inter', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    .glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 2rem;
    }

    .code {
      font-family: 'Playfair Display', serif;
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 400;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 1px rgba(139, 92, 246, 0.4);
      letter-spacing: -0.05em;
      margin-bottom: 1.5rem;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { -webkit-text-stroke-color: rgba(139, 92, 246, 0.3); }
      50% { -webkit-text-stroke-color: rgba(139, 92, 246, 0.8); text-shadow: 0 0 40px rgba(139, 92, 246, 0.3); }
    }

    .badge {
      display: inline-block;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #a78bfa;
      border: 1px solid rgba(139, 92, 246, 0.3);
      padding: 0.4rem 1rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.2rem, 4vw, 2rem);
      font-weight: 400;
      color: #fff;
      margin-bottom: 1rem;
    }

    p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
      max-width: 360px;
      margin: 0 auto 2.5rem;
      line-height: 1.7;
      letter-spacing: 0.02em;
    }

    .btn {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 0.75rem 2rem;
      border-radius: 4px;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.6);
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    .line {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, rgba(139, 92, 246, 0.5), transparent);
      margin: 2.5rem auto;
    }

    .brand {
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="container">
    <div class="code">404</div>
    <div class="badge">SC Security Consulting</div>
    <h1>Página no encontrada</h1>
    <p>La página que estás buscando no existe o fue removida. Verificá la URL e intentá nuevamente.</p>
    <a href="javascript:window.close()" class="btn">Cerrar ventana</a>
    <div class="line"></div>
    <div class="brand">© C Design IA — cdesign_ia</div>
  </div>
</body>
</html>
